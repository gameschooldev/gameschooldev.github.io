<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Content</title>
</head>
<body>
    <div id="externalContent"></div>
    <script>
        // Fetch and display external content
        const externalContentDiv = document.getElementById('externalContent');
        fetch('https://play.blooket.com')
            .then(response => response.text())
            .then(html => {
                externalContentDiv.innerHTML = html;
            })
            .catch(error => {
                console.error('Error fetching content:', error);
            });
    </script>
</body>
</html>
